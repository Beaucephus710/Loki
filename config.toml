##############################################
# LOKI GLOBAL SETTINGS
##############################################

color = false
boot_animation = true
regular_animation = true
level_speed = 2
ascii_mode = true


##############################################
# PLUGIN: AI BRAIN
##############################################
[plugins.ai_brain]
enabled = true
use_openai = false
model = "gpt-4o-mini"
auto_reply = false
learning = false
debug = false


##############################################
# PLUGIN: SCAN
##############################################
[plugins.scan]
enabled = true
wifi = false
ble = false
ethernet = true
interval = 5


##############################################
# PLUGIN: SNIFF
##############################################
[plugins.sniff]
enabled = true
interface = "wlan0"
channel_hop = true
hop_interval = 3


##############################################
# PLUGIN: DISPLAY
##############################################
[plugins.display]
enabled = true
driver = "fb"
device = "/dev/fb1"
invert = false
contrast = 50


##############################################
# PLUGIN: LOKI ANIMATION
##############################################
[plugins.loki_animation]
enabled = true
speed = 2
style = "default"


##############################################
# PLUGIN: BETTERCAP
##############################################
[plugins.bettercap]
enabled = false
path = "/usr/local/bin/bettercap"
auto_start = false


##############################################
# PLUGIN: GPS
##############################################
[plugins.gps]
enabled = false
device = "/dev/ttyUSB0"
baud = 9600


##############################################
# PLUGIN: BLE
##############################################
[plugins.ble]
enabled = false
scan = false
interval = 10


##############################################
# PLUGIN: UPS
##############################################
[plugins.ups]
enabled = false
battery_min = 20
shutdown_on_low = true


##############################################
# PLUGIN: TOUCH
##############################################
[plugins.touch]
enabled = false
device = "/dev/input/event0"


##############################################
# PLUGIN: WIFI TOOLS
##############################################
[plugins.wifi_tools]
enabled = false
auto_deauth = false
auto_probe = false


##############################################
# PLUGIN: PWNY
##############################################
[plugins.pwny]
enabled = false
auto_attack = false
aggressive = false


##############################################
# PLUGIN: PWNAGOTCHI
##############################################
[plugins.pwnagotchi]
enabled = false
personality = "default"
auto_handshake = false


##############################################
# PLUGIN: WPA-SEC HANDSHAKE FETCHER
##############################################
[plugins.wpa_sec]
enabled = true
api_key = ""  # set your wpa-sec API key here
auto_fetch = true
auto_upload = true
interval = 30


##############################################
# PLUGIN: WIGLE WIFI MAPPING
##############################################
[plugins.wigle]
enabled = false
api_key = ""
username = ""
password = ""


##############################################
# PLUGIN: ONLINEHASHCRACK
##############################################
[plugins.onlinehash]
enabled = false
api_key = ""
auto_upload = false


##############################################
# DRAGON GROWTH AND ANIMATION
# Change these values to alter how fast Loki
# grows, how moods shift, and how animation
# looks — no code changes needed.
##############################################

[dragon]
# Set to false to disable the dragon system entirely
enabled = true
# Path to the persisted dragon state JSON (~ is expanded)
state_path = "~/.local/share/loki/dragon_state.json"
# Set to false to disable persistence (useful for testing/demo)
persist = true

[dragon.xp]
# XP required to reach each life stage (egg starts at 0)
# Increase these numbers to slow growth; decrease to speed it up
hatchling = 5
juvenile  = 25
adult     = 75

# XP awarded per interaction type
care = 2
talk = 1
play = 2
feed = 1
rest = 1

[dragon.mood]
# Mood score (0–100) boundaries for named mood states
# Scores at or above each threshold use that label
happy   = 80
content = 55
sleepy  = 30
# Below the sleepy threshold Loki is "grumpy"

# Mood points added per interaction type
care = 5
talk = 3
play = 6
feed = 4
rest = 2

# Idle decay: how quickly needs fall when Loki is left alone
# Decay begins after this many hours of inactivity
decay_after_hours      = 0.25
decay_hunger_per_hour  = 4
decay_energy_per_hour  = 3
decay_mood_per_hour    = 2

[dragon.animation]
# Set to false to disable rendering even if the plugin is enabled
enabled    = true
# Frame dimensions in pixels — should match the display resolution
width      = 480
height     = 320
# Target frames per second for the render loop
fps        = 10
# Background colour as [R, G, B]
background = [12, 18, 38]
# Visual style: "default" is the only built-in style
style      = "default"
