##############################################
# LOKI GLOBAL SETTINGS
##############################################

color = false
boot_animation = true
regular_animation = true
level_speed = 2
ascii_mode = true


##############################################
# PLUGIN: AI BRAIN
##############################################
[plugins.ai_brain]
enabled = true
use_openai = false
model = "gpt-4o-mini"
auto_reply = false
learning = false
debug = false


##############################################
# PLUGIN: SCAN
##############################################
[plugins.scan]
enabled = true
wifi = false
ble = false
ethernet = true
interval = 5


##############################################
# PLUGIN: SNIFF
##############################################
[plugins.sniff]
enabled = true
interface = "wlan0"
channel_hop = true
hop_interval = 3


##############################################
# PLUGIN: DISPLAY
##############################################
[plugins.display]
enabled = true
driver = "fb"
device = "/dev/fb1"
invert = false
contrast = 50


##############################################
# PLUGIN: LOKI ANIMATION
##############################################
[plugins.loki_animation]
enabled = true
speed = 2
style = "default"


##############################################
# PLUGIN: BETTERCAP
##############################################
[plugins.bettercap]
enabled = false
path = "/usr/local/bin/bettercap"
auto_start = false


##############################################
# PLUGIN: GPS
##############################################
[plugins.gps]
enabled = false
device = "/dev/ttyUSB0"
baud = 9600


##############################################
# PLUGIN: BLE
##############################################
[plugins.ble]
enabled = false
scan = false
interval = 10


##############################################
# PLUGIN: UPS
##############################################
[plugins.ups]
enabled = false
battery_min = 20
shutdown_on_low = true


##############################################
# PLUGIN: TOUCH
##############################################
[plugins.touch]
enabled = false
device = "/dev/input/event0"


##############################################
# PLUGIN: WIFI TOOLS
##############################################
[plugins.wifi_tools]
enabled = false
auto_deauth = false
auto_probe = false


##############################################
# PLUGIN: PWNY
